aid: runway-ml
name: Runway
description: Runway is a generative AI research company that builds creative tools
  for video, image, and audio production. Its flagship Gen-4 family of models powers
  text-to-video, image-to-video, video-to-video, and text-to-image generation, alongside
  text-to-speech and avatar capabilities. Runway serves filmmakers, advertisers, designers,
  and developers, monetizing through consumer creative subscriptions and a developer
  API with self-serve and enterprise tiers. The Runway API lets teams embed generative
  media directly into their applications and agent workflows.
